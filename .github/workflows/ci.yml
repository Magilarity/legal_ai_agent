name: CI & Docker Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    name: Лінтинг та тести
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black mypy pytest python-dotenv prometheus-client

      - name: Lint with flake8
        run: flake8 .

      - name: Format check with black
        run: black --check .

      - name: Type check with mypy
        run: mypy app

      - name: Run tests with pytest
        run: pytest -q

  build-and-push:
    name: Збірка і пуш Docker-образу
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        id: build-image
        run: |
          IMAGE_SHA_TAG=${{ secrets.DOCKERHUB_USERNAME }}/legal_ai_agent:${{ github.sha }}
          IMAGE_LATEST_TAG=${{ secrets.DOCKERHUB_USERNAME }}/legal_ai_agent:latest

          docker build -t $IMAGE_SHA_TAG .
          docker tag $IMAGE_SHA_TAG $IMAGE_LATEST_TAG

          # Зберігаємо в середовище для наступного кроку
          echo "IMAGE_SHA_TAG=$IMAGE_SHA_TAG" >> $GITHUB_ENV
          echo "IMAGE_LATEST_TAG=$IMAGE_LATEST_TAG" >> $GITHUB_ENV

      - name: Push to Docker Hub
        run: |
          docker push $IMAGE_SHA_TAG
          docker push $IMAGE_LATEST_TAG