services:
  # ── Ваш Streamlit-додаток ───────────────────────────────────────────────
  app:
    build: .
    container_name: legal_ai_agent
    env_file: .env
    ports:
      - "8501:8501"    # Streamlit UI
      - "8001:8001"    # Prometheus метрики
    depends_on:
      - db
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: legal_ai_agent_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.rules.yml:/etc/prometheus/alerts.rules.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app
    restart: unless-stopped

  # ── Alertmanager ────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/config.yml:ro
    ports:
      - "9093:9093"
    environment:
      - SLACK_API_URL=${SLACK_API_URL}
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=alex1949
    restart: unless-stopped
    # --- тут додаємо том ---
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

volumes:
  db_data: